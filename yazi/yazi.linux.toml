# Ubuntu / Zorin-oriented Yazi configuration
[mgr]
ratio = [2, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]
title_format = "Yazi: {cwd}"

[preview]
wrap = "no"
tab_size = 2
image_delay = 30
image_filter = "triangle"
image_quality = 75

[opener]
edit = [{ run = '${EDITOR:-vim} "$@"', desc = "Edit", block = true, for = "unix" }]
open = [{ run = 'xdg-open "$@"', desc = "Open", orphan = true, for = "linux" }]
reveal = [{ run = 'xdg-open "$(dirname "$1")"', desc = "Open containing folder", orphan = true, for = "linux" }]

[open]
rules = [
  { url = "*.code-workspace", use = ["open", "reveal"] },
  { mime = "text/*", use = ["edit", "reveal"] },
  { mime = "application/{json,ndjson}", use = ["edit", "reveal"] },
  { mime = "*/javascript", use = ["edit", "reveal"] },
  { mime = "inode/empty", use = ["edit", "reveal"] },
  { url = "*", use = ["open", "reveal"] },
]

[tasks]
micro_workers = 5
macro_workers = 4
bizarre_retry = 3
image_alloc = 268435456
image_bound = [10000, 10000]
suppress_preload = false

[which]
sort_by = "none"
sort_sensitive = false
sort_reverse = false
sort_translit = false
